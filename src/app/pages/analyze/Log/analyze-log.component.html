<div class="d-flex" style="max-width: 100vw; overflow-x: hidden;">

    <div class="content-wrapper ps-2 pe-2 flex-grow-1" [ngClass]="{ 'with-sidebar': showFilterPanel }">
        <div class="container-xxl flex-grow-1 container-p-y">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center  mt-3">
                    <img src="/assets/img/view.png" alt="icon" height="40px" width="auto">
                    <label class="card-header title-content mb-0 ml-2" style="font-size: 20px; font-weight: 500; padding-bottom: 10px;">
                        Analyze Log
                    </label>
                </div>
            </div>
            <!-- Search Section -->
            <div class="d-flex justify-content-between align-items-start mt-4">
                <div class="form-group mb-0 w-100 me-3">
                    <input
                    type="text"
                    class="form-control"
                    placeholder="Search by Message ID, Sender (From), Destination (To), or Status Code"
                    #searchInput
                    />
                </div>
    
                <div class="d-flex flex-column">
                    <div class="d-flex mb-2">
                        <button class="btn btn-red me-2" (click)="onSearch(searchInput.value)">
                            <i class='bx bx-search'></i>
                        </button>
                        <button class="btn btn-red" (click)="toggleFilter()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="22" height="22" fill="none">
                                <path d="M12 16H52L36 34V52L28 57V34L12 16Z" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="d-flex ms-auto justify-content-end mb-2">
                <button class="btn btn-red me-2 text-nowrap" (click)="exportLogs()" [disabled]="!showExportButton">
                    Export Logs (.xlsx)
                </button>
                <a class="btn btn-red text-nowrap" routerLink="../download-cdr">
                    Download History
                </a>
            </div>
            <!-- Table Section -->
            <div class="card ps-3 pe-3 pb-4 mt-2 bg-white">
                <div class="table-responsive mt-4">
                    <table id="tableBroadcast" *ngIf="dtOptions && dtOptions.ajax"
                            class="table" style="width:100%" datatable [dtOptions]="dtOptions" class="row-border hover">
                        <thead>
                            <tr>
                            <th>SUBMIT DATE</th>
                            <th>SENDER (FROM)</th>
                            <th>DESTINATION (TO)</th>
                            <th>ACCOUNT</th>
                            <th>DESTINATION GATEWAY</th>
                            <th>MESSAGE PREVIEW</th>
                            <th>STATUS</th>
                            <th class="align-center">ACTIONS</th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <app-filters
        *ngIf="showFilterPanel"
        class="filter-sidebar"
        [originNetworkList]="networksList"
        [destinationNetworkList]="networksList"
        [catalogBroadcastList]="catalogBroadcastList"
        (close)="toggleFilter()"
        [initialFilters]="filters"
        (apply)="applyFilters($event)">
    </app-filters>
    
</div>

<!-- MODALS -->
<div class="modal fade" tabindex="-1" role="dialog" id="modalCdr" data-bs-backdrop="static" aria-labelledby="staticBackdropLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <ng-container *ngIf="selectedLog">
            <app-cdr-view [selectedLog]="selectedLog" (closeModal)="closeModal()"></app-cdr-view>
        </ng-container>
    </div>
</div>

<div class="modal fade" tabindex="-1" role="dialog" id="modalExportCdr" data-bs-backdrop="static"
  aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <app-modal-delete 
        [confirmButtonText]="'Export'" 
        [cancelButtonText]="'Cancel'" 
        [mensaje]="messageShow" 
        (confirmAction)="onConfirmExport($event)">
    </app-modal-delete>
  </div>
</div>
