<div class="d-flex" style="max-width: 100vw; overflow-x: hidden;">
    <div class="content-wrapper ps-2 pe-2 flex-grow-1" [ngClass]="{ 'with-sidebar': showFilterPanel }">
        <div class="container-xxl flex-grow-1 container-p-y">

            <!-- Header -->
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center mt-3">
                    <img src="/assets/img/view.png" alt="icon" height="40px" width="auto">
                    <label class="card-header title-content mb-0 ml-2"
                        style="font-size: 20px; font-weight: 500; padding-bottom: 10px;">
                        Analyze Reports
                    </label>
                </div>
            </div>

            <!-- Filters Card -->
            <div class="card ps-3 pe-3 pb-4 pt-3 mt-2 bg-white">
                <form *ngIf="filtersForm" [formGroup]="filtersForm">
                    <div class="row">

                        <!-- Report and Date Range -->
                        <div class="col-md-4 mb-3">
                            <label>Report Content</label>
                            <ng-select [items]="reportOptions" bindLabel="label" bindValue="value"
                                formControlName="report_type" [clearable]="true">
                            </ng-select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Start Date</label>
                            <input type="datetime-local" class="form-control" formControlName="start_datetime" />
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>End Date</label>
                            <input type="datetime-local" class="form-control" formControlName="end_datetime" />
                        </div>

                        <!-- Network Filters -->
                        <div class="col-md-4 mb-3">
                            <label>Account (Origin Network)</label>
                            <ng-select [items]="networksList" bindLabel="name" bindValue="network_id"
                                formControlName="origin_network" [multiple]="true" placeholder="Select accounts">
                            </ng-select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Destination Gateway</label>
                            <ng-select [items]="networksList" bindLabel="name" bindValue="network_id"
                                formControlName="destination_network" [multiple]="true" placeholder="Select gateways">
                            </ng-select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Message Type</label>
                            <ng-select [items]="['MESSAGE', 'DELIVER']" formControlName="message_type" placeholder="ALL"
                                [clearable]="true">
                            </ng-select>
                        </div>

                        <!-- Campaign and User -->
                        <div class="col-md-4 mb-3">
                            <label>Campaign</label>
                            <ng-select [items]="broadcastNameList" bindLabel="name" bindValue="id"
                                formControlName="broadcast_filter_id" [multiple]="true" placeholder="Select broadcasts"
                                [clearable]="true">
                            </ng-select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>User</label>
                            <ng-select [items]="broadcastUserList" bindLabel="name" bindValue="id"
                                formControlName="broadcast_filter_user" [multiple]="true" placeholder="Select users"
                                [clearable]="true">
                            </ng-select>
                        </div>
                    </div>
                </form>
                <div class="row mt-4">
                    <div class="d-flex ms-auto justify-content-center">
                        <button type="button" class="btn btn-red text-nowrap" (click)="exportLogs()">
                            Export Report (.xlsx)
                        </button>
                        <a class="btn btn-red text-nowrap ms-2" routerLink="../download-report">
                            Download History
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" tabindex="-1" role="dialog" id="modalExportReport" data-bs-backdrop="static" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <app-modal-delete [confirmButtonText]="'Export'" [cancelButtonText]="'Cancel'" [mensaje]="messageShow"
            (confirmAction)="onConfirmExport($event)">
        </app-modal-delete>
    </div>
</div>
