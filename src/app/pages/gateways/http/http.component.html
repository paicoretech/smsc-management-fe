<div class="content-wrapper ps-2 pe-2">
  <div class="container-xxl flex-grow-1 container-p-y">
    <div class="d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center mt-3">
        <img src="/assets/img/base-station-icon-1.png" alt="icon" height="40px" width="auto">
        <label class="card-header title-content mb-0 ml-2"
          style="font-size: 20px; font-weight: 500; padding-bottom: 10px;">
          HTTP Gateways
        </label>
      </div>
      <div>
        <button type="button" class="btn btn-red mt-3" (click)="goToCreate()" style="margin-right: 10px;">
          <i class='bx bx-plus'></i>
          Create
        </button>
        <button type="button" class="btn btn-red mt-3" (click)="refresh()">
          <i class='bx bx-refresh'></i>
        </button>
      </div>
    </div>
    <div class="card ps-3 pe-3 pb-4 mt-2 bg-white">
      <div class="table-responsive mt-4">
        <table id="tableExample" class="table" style="width:100%" datatable [dtOptions]="dtOptions"
          [dtTrigger]="dtTrigger">
          <thead>
            <tr>
              <th>Network ID</th>
              <th>Name</th>
              <th>SystemId</th>
              <th>Sessions</th>
              <th>State</th>
              <th>Active Sessions</th>
              <th class="align-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of gateways; let i = index">
              <td class="align-middle">{{ item.network_id }}</td>
              <td class="align-middle">{{ item?.name }}</td>
              <td class="align-middle">{{ item?.system_id }}</td>
              <td class="align-middle">{{ item?.sessions_number }}</td>
              <td class="align-middle">{{ item?.status }}</td>
              <td class="align-middle">{{ item?.active_sessions_numbers }}</td>
              <td class="align-center">
                <a class="btn btn-sm btn-outline-secondary me-2" title="view record" (click)="editData(item, true)"><i class='bx bxs-show'></i></a>
                <button [disabled]="item.enabled!==0" class="btn btn-sm btn-red me-2"
                  (click)="editData(item)" title="Edit record"><i class='bx bxs-pencil'></i></button>
                <button [disabled]="item.enabled!==0" class="btn btn-sm btn-secondary me-2"
                  title="Delete record" (click)="deleteGateway(item)"><i class='bx bxs-trash-alt'></i></button>
                <button [disabled]="item.enabled!==0" class="btn btn-sm btn-success me-2"
                  title="Start" (click)="runGateway(item)"><i class='bx bx-play'></i></button>
                <button [disabled]="item.enabled ==0" class="btn btn-sm btn-danger"
                  title="Stop" (click)="stopGateway(item)"><i class='bx bx-pause'></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" tabindex="-1" role="dialog" id="modalDeleteHttpGateway" data-bs-backdrop="static"
  aria-labelledby="staticBackdropLabel">
  <div class="modal-dialog" role="document">
    <app-modal-delete [mensaje]="messageShow" (confirmAction)="onCloseModalDelete($event)"></app-modal-delete>
  </div>
</div>
