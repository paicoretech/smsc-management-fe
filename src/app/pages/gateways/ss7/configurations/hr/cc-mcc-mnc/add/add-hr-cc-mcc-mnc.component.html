<div class="modal-content">
  <div class="modal-header" style="border: none;">
    <div class="d-flex justify-content-between align-items-center w-100">
      <h5 class="modal-title text-center mx-auto">{{ title }}</h5>
      <button type="button" class="btn btn-close-modal" (click)="close()">X</button>
    </div>
  </div>

  <div class="modal-body">
    <form [formGroup]="form" (ngSubmit)="save()" class="row g-3 d-flex justify-content-center">

      <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
          <div class="form-group row mb-2">
            <label class="col-sm-5 label">MSISDN Prefix</label>
            <div class="col-sm-7">
              <input type="text" inputmode="numeric" class="form-control" formControlName="country_code"
                     [class.is-invalid]="validInput('country_code')">
              <span class="text-danger mt-2" *ngIf="validInput('country_code') && form.get('country_code')?.errors?.['required']">
                This field is required
              </span>
              <span class="text-danger mt-2" *ngIf="validInput('country_code') && form.get('country_code')?.errors?.['pattern']">
                Only digits are allowed
              </span>
            </div>
          </div>
        </div>
      </div> 

      <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
          <div class="form-group row mb-2">
            <label class="col-sm-5 label">MCC-MNC</label>
            <div class="col-sm-7">
              <input type="text" inputmode="numeric" class="form-control" formControlName="mcc_mnc"
                     [class.is-invalid]="validInput('mcc_mnc')">
              <span class="text-danger mt-2" *ngIf="validInput('mcc_mnc') && form.get('mcc_mnc')?.errors?.['required']">
                This field is required
              </span>
              <span class="text-danger mt-2" *ngIf="validInput('mcc_mnc') && form.get('mcc_mnc')?.errors?.['pattern']">
                Only digits are allowed
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
          <div class="form-group row mb-2">
            <label class="col-sm-5 label">SMSC</label>
            <div class="col-sm-7">
              <input type="text" inputmode="numeric" class="form-control" formControlName="smsc"
                     [class.is-invalid]="validInput('smsc')">
              <span class="text-danger mt-2" *ngIf="validInput('smsc') && form.get('smsc')?.errors?.['pattern']">
                Only digits are allowed
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-lg-4 col-md-6 col-sm-12 mx-auto">
          <button class="btn btn-red" style="width: 100%;" [disabled]="form.invalid">Save</button>
        </div>
      </div>

    </form>
  </div>
</div>
