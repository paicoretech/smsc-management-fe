<div class="content-wrapper ps-2 pe-2">
  <div class="container-xxl flex-grow-1 container-p-y">
    <div class="d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center mt-3">
        <img
          src="/assets/img/base-station-icon-1.png"
          alt="icon"
          height="40px"
          width="auto"
        />

        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item mt-4 not-bredcrumb">
              <a
                [routerLink]="'../../../'"
                class="card-header title-content mb-0 ml-2"
                style="font-size: 20px; font-weight: 500; color: #1d609d"
              >
                Gateways SS7
              </a>
            </li>
            <li class="breadcrumb-item mt-4">
              <a
                [routerLink]="'../'"
                class="card-header title-content mb-0 ml-2"
                style="
                  font-size: 20px;
                  font-weight: 500;
                  color: #1d609d;
                  margin-left: 0px;
                "
              >
                {{ gatewaySs7 ? gatewaySs7.name : "" }}
              </a>
            </li>
            <li
              class="breadcrumb-item active"
              style="margin-top: 22px; color: #7b3031; font-size: 18px"
              aria-current="page"
            >
              <label class="mt-1">HR</label>
            </li>
          </ol>
        </nav>
      </div>
    </div>
    <div class="ps-3 pe-3 pb-4 mt-2 bg-white pt-10">
      <!-- tabs -->
      <ul class="nav nav-tabs mt-4 pt-4" id="options">
        <li class="nav-item">
          <a
            class="nav-link"
            role="button"
            [class.active]="activeTab === 'general'"
            (click)="setTab('general')"
          >
            General
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            role="button"
            [class.active]="activeTab === 'mcmccmnc'"
            (click)="setTab('mcmccmnc')"
          >
            MSISDN Prefix / MCC-MNC
          </a>
        </li>
      </ul>

      <div class="tab-content" id="myTabContent">
        <div
          class="tab-pane fade"
          [class.show]="activeTab === 'general'"
          [class.active]="activeTab === 'general'"
        >
          <app-general-hr [dataGateway]="gatewaySs7" *ngIf="activeTab === 'general'"></app-general-hr>
        </div>

        <div
          class="tab-pane fade"
          [class.show]="activeTab === 'mcmccmnc'"
          [class.active]="activeTab === 'mcmccmnc'"
        >
          <app-hr-cc-mcc-mnc
            *ngIf="activeTab === 'mcmccmnc'"
          ></app-hr-cc-mcc-mnc>
        </div>
      </div>
    </div>
  </div>
</div>
