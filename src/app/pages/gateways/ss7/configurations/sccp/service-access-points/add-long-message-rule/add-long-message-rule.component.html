<div class="modal-content">
    <div class="modal-header" style="border: none;">
      <div class="d-flex justify-content-between align-items-center w-100">
        <h5 class="modal-title text-center mx-auto">{{ title }}</h5>
        <button type="button" class="btn btn-close-modal" (click)="close(false)">X</button>
      </div>
    </div>
    <div class="modal-body">
      <form [formGroup]="form" (ngSubmit)="save()" class="row g-3 d-flex justify-content-center">

        <div class="row">
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12">
            <div class="row">
              <div class="form-group row mb-2">
                <label for="first_pc" class="col-sm-5 label">First PC</label>
                <div class="col-sm-7">
                  <input type="text" class="form-control" id="first_pc" formControlName="first_pc"
                    [class.is-invalid]="validInput('first_pc')">
                  <span class="text-danger mt-2" *ngIf="validInput('first_pc')">
                    the field is required
                  </span>
                  <span class="text-danger mt-2" *ngIf="validPattern('first_pc')">
                    {{ getPatternMessage('first_pc') }}
                  </span>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12">
            <div class="form-group row mb-2">
              <label for="long_message_rule_type" class="col-sm-5 label">Rule Type</label>
              <div class="col-sm-7" style="padding-left: 0px; padding-right: 35px;">
                <select class="form-select" id="long_message_rule_type" name="long_message_rule_type" formControlName="long_message_rule_type">
                  <option *ngFor="let type of longMessageRuleTypes" [value]="type.value">{{ type.label }}</option>
                </select>
                <span class="text-danger mt-2" *ngIf="validInput('long_message_rule_type')">
                  the field is required
                </span>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12">
            <div class="row">
              <div class="form-group row mb-2">
                <label for="last_pc" class="col-sm-5 label">Last PC</label>
                <div class="col-sm-7">
                  <input type="text" class="form-control" id="last_pc" formControlName="last_pc"
                    [class.is-invalid]="validInput('last_pc')">
                  <span class="text-danger mt-2" *ngIf="validInput('last_pc')">
                    the field is required
                  </span>
                  <span class="text-danger mt-2" *ngIf="validPattern('last_pc')">
                    {{ getPatternMessage('last_pc') }}
                  </span>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12">
            <div class="form-group row mb-2">
              <label for="sap_id" class="col-sm-5 label">SAP ID</label>
              <div class="col-sm-7" style="padding-left: 0px; padding-right: 35px;">
                <select class="form-select" id="sap_id" name="sap_id" formControlName="sap_id">
                  <option *ngFor="let item of listSAP; let i = index" [value]="item.id">{{ item.name }}</option>
                </select>
                <span class="text-danger mt-2" *ngIf="validInput('sap_id')">
                  the field is required
                </span>
              </div>
            </div>
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-lg-4 col-md-6 col-sm-12 mx-auto">
            <button class="btn btn-red" style="width: 100%;" [disabled]="form.invalid">Save</button>
          </div>
        </div>

      </form>
    </div>
  </div>
